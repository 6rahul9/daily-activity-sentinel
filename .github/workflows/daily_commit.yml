name: Daily Sentinel Commit

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Autocommit Script
        run: python autocommit.py

      - name: Commit and Push changes
        run: |
          git config user.name "Rahul Mohuture"
          git config user.email "6rahul9@users.noreply.github.com"
          git add daily_logs.md
          git diff --cached --quiet || git commit -m "Sentinel Daily Update: $(date +'%Y-%m-%d')"
          git push origin main
