name: Daily Sentinel Commit

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Autocommit Script
        run: python autocommit.py

      - name: Commit and Push changes
        run: |
          git config user.name "Rahul Mohuture"
          git config user.email "97466426+6rahul9@users.noreply.github.com"

          git add daily_logs.md

          if ! git diff --cached --quiet; then
            git commit -m "Sentinel Daily Update: $(date +'%Y-%m-%d')"
          else
            echo "No changes to commit"
            exit 0
          fi

          git pull origin main --rebase
          git push origin main
